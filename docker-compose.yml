version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: morpion_db
    environment:
      POSTGRES_USER: morpion
      POSTGRES_PASSWORD: morpion123
      POSTGRES_DB: morpion
    ports:
      - "5432:5432"
    volumes:
      - morpion_data:/var/lib/postgresql/data

volumes:
  morpion_data: